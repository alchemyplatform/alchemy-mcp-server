name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish even without changesets"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        run: |
          changesets=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null || true)
          if [ -n "$changesets" ] || [ "${{ github.event.inputs.force_publish }}" = "true" ]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm version-packages

      - name: Get version
        if: steps.changesets.outputs.has_changesets == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Configure git to use the GitHub App
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git push

      - name: Build
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"

          # Extract changelog for this version
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## ${{ steps.version.outputs.version }}/{flag=1; next} /^## [0-9]/{flag=0} flag" CHANGELOG.md)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$NOTES"

      - name: No changesets found
        if: steps.changesets.outputs.has_changesets != 'true'
        run: echo "No changesets found — skipping publish."
